<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-ar="نسيت كلمة المرور | مستشفى ريتاج التخصصي" data-en="Forgot Password | Ritaj Specialized Hospital">نسيت كلمة المرور | مستشفى ريتاج التخصصي</title>
<link rel="icon" type="image/png" href="../assets/Logo.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<style>
  body{font-family:'Cairo',sans-serif;}
  .lang-toggle-auth {
    position:absolute; top:20px; inset-inline-end:20px;
    display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #dce8e0;
    color:#1a7a3c; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:700;
    font-size:.85rem; font-family:'Cairo',sans-serif;
  }
</style>
</head>
<body>
<div class="auth-page" style="position:relative;">
<button class="lang-toggle-auth" id="langToggle" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="langLabel">EN</span></button>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="../assets/Logo.jpg" alt="ريتاج" style="height:56px;object-fit:contain;margin-bottom:10px;border-radius:10px;">
      <div class="auth-logo" style="font-size:1.5rem;" data-ar="مستشفى ريتاج التخصصي" data-en="Ritaj Specialized Hospital">مستشفى ريتاج <span class="x">التخصصي</span></div>
      <p class="auth-tagline" data-ar="صحتك أمانتنا، ورعايتك مسؤوليتنا" data-en="Your Health, Our Trust — Your Care, Our Responsibility">صحتك أمانتنا، ورعايتك مسؤوليتنا</p>
    </div>

    <div class="auth-title">
      <h1 data-ar="نسيت كلمة المرور؟" data-en="Forgot Password?">نسيت كلمة المرور؟</h1>
      <p data-ar="لا تقلق، سنرسل لك رابط إعادة التعيين" data-en="No worries, we'll send you a reset link">لا تقلق، سنرسل لك رابط إعادة التعيين</p>
    </div>

    <div class="alert" id="alert"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label class="form-label" data-ar="البريد الإلكتروني" data-en="Email">البريد الإلكتروني</label>
        <input type="email" class="form-input" id="email" placeholder="example@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submitBtn" data-ar="إرسال رابط إعادة التعيين" data-en="Send Reset Link">إرسال رابط إعادة التعيين</button>
    </form>

    <div class="auth-footer">
      <a href="index.html"><i class="fas fa-arrow-right"></i> <span data-ar="العودة لتسجيل الدخول" data-en="Back to Login">العودة لتسجيل الدخول</span></a>
    </div>
  </div>
</div>
</div>

<script src="../config.js"></script>
<script src="js/api.js"></script>
<script>
let currentLang = localStorage.getItem('ritaj-lang') || 'ar';

const AUTH_STRINGS = {
  sending: { ar: 'جارِ الإرسال...', en: 'Sending...' },
  sendBtn: { ar: 'إرسال رابط إعادة التعيين', en: 'Send Reset Link' },
  sendSuccess: { ar: 'تم إرسال رابط إعادة التعيين! تحقق من بريدك الإلكتروني.', en: 'Reset link sent! Check your email.' },
  sendFail: { ar: 'فشل إرسال رابط إعادة التعيين', en: 'Failed to send reset link' }
};
function t(key) { return AUTH_STRINGS[key][currentLang]; }

function applyLang() {
  const isAr = currentLang === 'ar';
  document.getElementById('html-root').lang = currentLang;
  document.getElementById('html-root').dir = isAr ? 'rtl' : 'ltr';
  document.getElementById('langLabel').textContent = isAr ? 'EN' : 'AR';
  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = isAr ? el.dataset.ar : el.dataset.en;
  });
}
function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('ritaj-lang', currentLang);
  applyLang();
}
applyLang();

function showAlert(message, type = 'error') {
  const alert = document.getElementById('alert');
  alert.className = `alert alert-${type} show`;
  alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
}

document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> ${t('sending')}`;

  const result = await API.forgotPassword(document.getElementById('email').value);

  if (result.success) {
    showAlert(t('sendSuccess'), 'success');
  } else {
    showAlert(result.message || t('sendFail'));
  }

  btn.disabled = false;
  btn.innerHTML = t('sendBtn');
});
</script>
</body>
</html>
