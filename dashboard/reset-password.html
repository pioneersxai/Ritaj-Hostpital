<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-ar="إعادة تعيين كلمة المرور | مستشفى ريتاج التخصصي" data-en="Reset Password | Ritaj Specialized Hospital">إعادة تعيين كلمة المرور | مستشفى ريتاج التخصصي</title>
<link rel="icon" type="image/png" href="../assets/Logo.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<style>
  body{font-family:'Cairo',sans-serif;}
  .lang-toggle-auth {
    position:absolute; top:20px; inset-inline-end:20px;
    display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #dce8e0;
    color:#1a7a3c; padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:700;
    font-size:.85rem; font-family:'Cairo',sans-serif;
  }
</style>
</head>
<body>
<div class="auth-page" style="position:relative;">
<button class="lang-toggle-auth" id="langToggle" onclick="toggleLang()"><i class="fas fa-globe"></i> <span id="langLabel">EN</span></button>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="../assets/Logo.jpg" alt="ريتاج" style="height:56px;object-fit:contain;margin-bottom:10px;border-radius:10px;">
      <div class="auth-logo" style="font-size:1.5rem;" data-ar="مستشفى ريتاج التخصصي" data-en="Ritaj Specialized Hospital">مستشفى ريتاج <span class="x">التخصصي</span></div>
      <p class="auth-tagline" data-ar="صحتك أمانتنا، ورعايتك مسؤوليتنا" data-en="Your Health, Our Trust — Your Care, Our Responsibility">صحتك أمانتنا، ورعايتك مسؤوليتنا</p>
    </div>

    <div class="auth-title">
      <h1 data-ar="إعادة تعيين كلمة المرور" data-en="Reset Password">إعادة تعيين كلمة المرور</h1>
      <p data-ar="أدخل كلمة المرور الجديدة أدناه" data-en="Enter your new password below">أدخل كلمة المرور الجديدة أدناه</p>
    </div>

    <div class="alert" id="alert"></div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label" data-ar="كلمة المرور الجديدة" data-en="New Password">كلمة المرور الجديدة</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="8">
          <span class="input-icon" onclick="togglePassword('password')">
            <i class="fas fa-eye" id="eyeIcon1"></i>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" data-ar="تأكيد كلمة المرور" data-en="Confirm Password">تأكيد كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required minlength="8">
          <span class="input-icon" onclick="togglePassword('confirmPassword')">
            <i class="fas fa-eye" id="eyeIcon2"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submitBtn" data-ar="إعادة تعيين كلمة المرور" data-en="Reset Password">إعادة تعيين كلمة المرور</button>
    </form>

    <div class="auth-footer">
      <a href="index.html"><i class="fas fa-arrow-right"></i> <span data-ar="العودة لتسجيل الدخول" data-en="Back to Login">العودة لتسجيل الدخول</span></a>
    </div>
  </div>
</div>
</div>

<script src="../config.js"></script>
<script src="js/api.js"></script>
<script>
let currentLang = localStorage.getItem('ritaj-lang') || 'ar';

const AUTH_STRINGS = {
  resetting: { ar: 'جارِ إعادة التعيين...', en: 'Resetting...' },
  resetBtn: { ar: 'إعادة تعيين كلمة المرور', en: 'Reset Password' },
  resetSuccess: { ar: 'تم تغيير كلمة المرور بنجاح! جارِ التحويل لتسجيل الدخول...', en: 'Password changed successfully! Redirecting to login...' },
  resetFail: { ar: 'فشل تغيير كلمة المرور. ربما انتهت صلاحية الرابط.', en: 'Failed to reset password. The link may have expired.' },
  pwMismatch: { ar: 'كلمتا المرور غير متطابقتين', en: 'Passwords do not match' },
  pwTooShort: { ar: 'يجب أن تكون كلمة المرور 8 أحرف على الأقل', en: 'Password must be at least 8 characters' },
  badLink: { ar: 'رابط إعادة التعيين غير صالح أو مفقود', en: 'Reset link is invalid or missing' },
  netError: { ar: 'خطأ في الشبكة. حاول مرة أخرى.', en: 'Network error. Please try again.' }
};
function t(key) { return AUTH_STRINGS[key][currentLang]; }

function applyLang() {
  const isAr = currentLang === 'ar';
  document.getElementById('html-root').lang = currentLang;
  document.getElementById('html-root').dir = isAr ? 'rtl' : 'ltr';
  document.getElementById('langLabel').textContent = isAr ? 'EN' : 'AR';
  document.querySelectorAll('[data-ar]').forEach(el => {
    el.textContent = isAr ? el.dataset.ar : el.dataset.en;
  });
}
function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  localStorage.setItem('ritaj-lang', currentLang);
  applyLang();
}
applyLang();

const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

function showAlert(message, type = 'error') {
  const alert = document.getElementById('alert');
  alert.className = `alert alert-${type} show`;
  alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
}

if (!token) {
  showAlert(t('badLink'), 'error');
  document.getElementById('resetForm').style.display = 'none';
}

function togglePassword(fieldId) {
  const input = document.getElementById(fieldId);
  const icon = fieldId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');

  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    showAlert(t('pwMismatch'), 'error');
    return;
  }

  if (password.length < 8) {
    showAlert(t('pwTooShort'), 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span> ${t('resetting')}`;

  try {
    const result = await API.resetPassword(token, password);

    if (result.success) {
      showAlert(t('resetSuccess'), 'success');
      setTimeout(() => window.location.href = 'index.html', 2000);
    } else {
      showAlert(result.message || t('resetFail'), 'error');
      btn.disabled = false;
      btn.innerHTML = t('resetBtn');
    }
  } catch (error) {
    showAlert(t('netError'), 'error');
    btn.disabled = false;
    btn.innerHTML = t('resetBtn');
  }
});
</script>
</body>
</html>
