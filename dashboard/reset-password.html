<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور | مستشفى ريتاج التخصصي</title>
    <link rel="icon" type="image/png" href="../assets/Logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>body{font-family:'Cairo',sans-serif;}</style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="../assets/Logo.jpg" alt="ريتاج" style="height:56px;object-fit:contain;margin-bottom:10px;border-radius:10px;">
                    <div class="auth-logo" style="font-size:1.5rem;">مستشفى ريتاج <span class="x">التخصصي</span></div>
                    <p class="auth-tagline">صحتك أمانتنا، ورعايتك مسؤوليتنا</p>
                </div>

                <div class="auth-title">
                    <h1>إعادة تعيين كلمة المرور</h1>
                    <p>أدخل كلمة المرور الجديدة أدناه</p>
                </div>

                <div class="alert" id="alert"></div>

                <form id="resetForm">
                    <div class="form-group">
                        <label class="form-label">كلمة المرور الجديدة</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="password" placeholder="••••••••" required minlength="8">
                            <span class="input-icon" onclick="togglePassword('password')">
                                <i class="fas fa-eye" id="eyeIcon1"></i>
                            </span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">تأكيد كلمة المرور</label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="confirmPassword" placeholder="••••••••" required minlength="8">
                            <span class="input-icon" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye" id="eyeIcon2"></i>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">إعادة تعيين كلمة المرور</button>
                </form>

                <div class="auth-footer">
                    <a href="index.html"><i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
        }

        if (!token) {
            showAlert('رابط إعادة التعيين غير صالح أو مفقود', 'error');
            document.getElementById('resetForm').style.display = 'none';
        }

        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = fieldId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('كلمتا المرور غير متطابقتين', 'error');
                return;
            }

            if (password.length < 8) {
                showAlert('يجب أن تكون كلمة المرور 8 أحرف على الأقل', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جارِ إعادة التعيين...';

            try {
                const result = await API.resetPassword(token, password);

                if (result.success) {
                    showAlert('تم تغيير كلمة المرور بنجاح! جارِ التحويل لتسجيل الدخول...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    showAlert(result.message || 'فشل تغيير كلمة المرور. ربما انتهت صلاحية الرابط.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'إعادة تعيين كلمة المرور';
                }
            } catch (error) {
                showAlert('خطأ في الشبكة. حاول مرة أخرى.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'إعادة تعيين كلمة المرور';
            }
        });
    </script>
</body>
</html>
