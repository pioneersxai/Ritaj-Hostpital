<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | مستشفى ريتاج التخصصي</title>

    <link rel="icon" type="image/png" href="../assets/Logo.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>body{font-family:'Cairo',sans-serif;}</style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <img src="../assets/Logo.jpg" alt="ريتاج" style="height:56px;object-fit:contain;margin-bottom:10px;border-radius:10px;">
                    <div class="auth-logo" style="font-size:1.5rem;">مستشفى ريتاج <span class="x">التخصصي</span></div>
                    <p class="auth-tagline">صحتك أمانتنا، ورعايتك مسؤوليتنا</p>
                </div>

                <div class="auth-title">
                    <h1>إنشاء حساب جديد</h1>
                    <p>سجّل الآن واحجز مواعيدك أونلاين</p>
                </div>

                <div class="alert" id="alert"></div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">الاسم الأول</label>
                            <input type="text" class="form-input" id="firstName" placeholder="محمد" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">اسم العائلة</label>
                            <input type="text" class="form-input" id="lastName" placeholder="أحمد" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" class="form-input" id="email" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">كلمة المرور</label>
                        <input type="password" class="form-input" id="password" placeholder="8 أحرف على الأقل" required minlength="8" autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label class="form-label">تأكيد كلمة المرور</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required autocomplete="new-password">
                    </div>

                    <div class="form-group" style="display: flex; align-items: flex-start; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="terms" required style="margin-top: 5px; accent-color: var(--primary);">
                        <label for="terms" style="font-size: 13px; color: var(--text-muted); line-height: 1.4;">
                            أوافق على <a href="../terms.html" style="color: var(--primary); text-decoration: none;">الشروط والأحكام</a> و<a href="../privacy.html" style="color: var(--primary); text-decoration: none;">سياسة الخصوصية</a>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="submitBtn">إنشاء الحساب</button>
                </form>

                <div class="auth-footer">
                    لديك حساب بالفعل؟ <a href="index.html">تسجيل الدخول</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../config.js"></script>
    <script src="js/api.js"></script>

    <script>
        if (API.isLoggedIn()) {
            window.location.href = 'dashboard.html';
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type} show`;
            alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showAlert('كلمتا المرور غير متطابقتين');
                return;
            }
            if (password.length < 8) {
                showAlert('يجب أن تكون كلمة المرور 8 أحرف على الأقل');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جارِ إنشاء الحساب...';

            try {
                const result = await API.register({
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    password: password,
                    confirmPassword: confirmPassword
                });

                if (result.success) {
                    showAlert('تم إنشاء الحساب بنجاح! جارِ التحويل...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1000);
                } else {
                    showAlert(result.message || 'فشل إنشاء الحساب');
                    btn.disabled = false;
                    btn.innerHTML = 'إنشاء الحساب';
                }
            } catch (err) {
                console.error("Critical Register Error:", err);
                showAlert("حدث خطأ في الاتصال. تحقق من الإنترنت.");
                btn.disabled = false;
                btn.innerHTML = 'إنشاء الحساب';
            }
        });
    </script>
</body>
</html>
