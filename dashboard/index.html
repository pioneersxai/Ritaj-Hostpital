<html lang="ar" dir="rtl"><head><style>body {transition: opacity ease-in 0.2s; }
body[unresolved] {opacity: 0; display: block; overflow: hidden; position: relative; }
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مستشفى ريتاج التخصصي - صحتك أمانتنا، ورعايتك مسؤوليتنا</title>

<link rel="icon" type="image/png" href="../assets/Logo.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<style>body{font-family:'Cairo',sans-serif;}</style>
</head>
<body>
<div class="auth-page">
<div class="auth-container">
<div class="auth-card">
<div class="auth-header">
<img src="../assets/Logo.jpg" alt="ريتاج" style="height:56px;object-fit:contain;margin-bottom:10px;border-radius:10px;">
<div class="auth-logo" style="font-size:1.5rem;">مستشفى ريتاج <span class="x">التخصصي</span></div>
<p class="auth-tagline">صحتك أمانتنا، ورعايتك مسؤوليتنا</p>
</div>

<div class="auth-title">
<h1>مرحباً بعودتك</h1>
<p>سجّل دخولك لمتابعة حسابك</p>
</div>

<div class="alert" id="alert"></div>

<form id="loginForm">
<div class="form-group">
<label class="form-label">البريد الإلكتروني</label>
<input type="email" class="form-input" id="email" placeholder="example@email.com" required>
</div>

<div class="form-group">
<label class="form-label">كلمة المرور</label>
<div class="input-wrapper">
<input type="password" class="form-input" id="password" placeholder="••••••••" required>
<span class="input-icon" onclick="togglePassword()">
<i class="fas fa-eye" id="eyeIcon"></i>
</span>
</div>
</div>

<a href="forgot-password.html" class="forgot-link">نسيت كلمة المرور؟</a>

<button type="submit" class="btn btn-primary btn-block" id="submitBtn">تسجيل الدخول</button>
</form>

<div class="auth-footer">
ليس لديك حساب؟ <a href="register.html">إنشاء حساب</a>
</div>
</div>
</div>
</div>

<script src="../config.js"></script>
<script src="js/api.js"></script>
<script>
// 1. Redirect if already logged in
if (API.isLoggedIn()) {
window.location.href = 'dashboard.html';
}

// 2. Password visibility toggle
function togglePassword() {
const input = document.getElementById('password');
const icon = document.getElementById('eyeIcon');
if (input.type === 'password') {
input.type = 'text';
icon.classList.replace('fa-eye', 'fa-eye-slash');
} else {
input.type = 'password';
icon.classList.replace('fa-eye-slash', 'fa-eye');
}
}

// 3. Robust Alert display
function showAlert(message, type = 'error') {
const alert = document.getElementById('alert');
alert.className = `alert alert-${type} show`;
alert.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
}

// 4. Form submission handler
document.getElementById('loginForm').addEventListener('submit', async (e) => {
e.preventDefault(); // Stop the page from refreshing

const btn = document.getElementById('submitBtn');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');

// CRITICAL FIX: Removing spaces and forcing lowercase for the email payload
const cleanEmail = emailInput.value.trim().toLowerCase();
const password = passwordInput.value;

// UI Loading state
btn.disabled = true;
btn.innerHTML = '<span class="spinner"></span> جارِ تسجيل الدخول...';

try {
// Call API using the fixed login method
const result = await API.login(cleanEmail, password);

if (result.success) {
showAlert('تم تسجيل الدخول بنجاح! جارِ التحويل...', 'success');
setTimeout(() => window.location.href = 'dashboard.html', 800);
} else {
// Show ACTUAL error from server (e.g., "Account Locked" or "Invalid credentials")
showAlert(result.message || 'البريد الإلكتروني أو كلمة المرور غير صحيحة');
btn.disabled = false;
btn.innerHTML = 'تسجيل الدخول';
}
} catch (err) {
console.error("Critical Login Error:", err);
showAlert("حدث خطأ في الاتصال. تحقق من الإنترنت.");
btn.disabled = false;
btn.innerHTML = 'تسجيل الدخول';
}
});
</script>

</body></html>
